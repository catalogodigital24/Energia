<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RHN6S60695"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RHN6S60695');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Energía</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <header>
        <h1>Sistemas Solares y Equipos Recargables Bayamo</h1>
        
        <div class="info-header">
            📦 Cantidad de artículos: <strong id="contador-articulos">0</strong>
        </div>
        
        <a href="https://catalogodigital24.github.io/Bayamo/" class="btn-cruzado-tiendas" style="background: linear-gradient(145deg, #e67e22, #d35400); border: 1px solid #a04000;">
        👜 Ver Artículos de Moda y Uso Personal Bayamo
        </a>
    </header>

    <div class="grid-productos" id="lista-productos">
        <p style="text-align: center; grid-column: 1 / -1; margin-top: 50px;">Cargando inventario y popularidad...</p>
    </div>

    <div id="visor-imagen" class="modal-imagen">
        <img id="imagen-ampliada" src="" alt="Vista ampliada">
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCDAvg2jWTF5TP388nXguftEXEedwEgv7M",
            authDomain: "catalogos-publicos.firebaseapp.com",
            projectId: "catalogos-publicos",
            storageBucket: "catalogos-publicos.firebasestorage.app",
            messagingSenderId: "205396171840",
            appId: "1:205396171840:web:7f62d6dbd22acc341853a5",
            measurementId: "G-27YGCP8REC"
        };

        // Inicializamos Firebase y la Base de Datos
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==========================================
        // 2. SISTEMA DE REGISTRO DE CLICS
        // ==========================================
        function registrarInteraccionGlobal(idProducto, tipo) {
            if(!idProducto) return; // Evitar errores si el producto no tiene ID
            
            const docRef = db.collection("estadisticas").doc(idProducto.toString());
            const incremento = firebase.firestore.FieldValue.increment(1);
            
            if (tipo === 'vista') {
                docRef.set({ vistas: incremento }, { merge: true }).catch(e => console.error(e));
            } else if (tipo === 'consulta') {
                docRef.set({ consultas: incremento }, { merge: true }).catch(e => console.error(e));
            }
        }

        // ==========================================
        // 3. LÓGICA DEL VISOR DE IMÁGENES
        // ==========================================
        const visor = document.getElementById('visor-imagen');
        const imgAmpliada = document.getElementById('imagen-ampliada');

        // Modificamos para recibir también el ID del producto
        window.abrirModal = function(urlImagen, idProducto) {
            imgAmpliada.src = urlImagen;
            visor.style.display = 'flex';
            
            // Magia para el móvil: Creamos un "paso" en el historial de navegación
            history.pushState({ modalAbierto: true }, "");

            // Registramos la vista en Firebase
            registrarInteraccionGlobal(idProducto, 'vista');
        };

        // Función para cerrar la imagen
        function cerrarModal() {
            visor.style.display = 'none';
            imgAmpliada.src = '';
        }

        // Si el usuario hace clic en cualquier parte de la pantalla negra o en la foto, se cierra
        visor.addEventListener('click', () => {
            cerrarModal();
            // Si cerramos tocando la pantalla, le decimos al navegador que regrese ese "paso" atrás
            if (history.state && history.state.modalAbierto) {
                history.back();
            }
        });

        // Si el usuario toca el botón físico "Atrás" de su celular o navegador
        window.addEventListener('popstate', (e) => {
            if (visor.style.display === 'flex') {
                cerrarModal(); // Cerramos el modal en lugar de salir de la página
            }
        });

        // ==========================================
        // 4. CARGA Y ORDENAMIENTO DEL INVENTARIO
        // ==========================================
        async function cargarInventario() {
            try {
                // A. Traer productos de GitHub
                const respuesta = await fetch('productos.json?t=' + new Date().getTime());
                if (!respuesta.ok) throw new Error("No se pudo cargar el inventario.");
                const productos = await respuesta.json();
                
                document.getElementById('contador-articulos').innerText = productos.length;

                // B. Traer estadísticas de Firebase
                let estadisticas = {};
                try {
                    const snapshot = await db.collection("estadisticas").get();
                    snapshot.forEach(doc => {
                        estadisticas[doc.id] = doc.data();
                    });
                } catch (errorFirebase) {
                    console.log("No se pudieron cargar estadísticas aún, se usará orden por defecto.", errorFirebase);
                }

                // C. Ordenar productos (Populares primero)
                productos.sort((a, b) => {
                    const statsA = estadisticas[a.id?.toString()] || { vistas: 0, consultas: 0 };
                    const statsB = estadisticas[b.id?.toString()] || { vistas: 0, consultas: 0 };
                    
                    const puntajeA = (statsA.consultas || 0) * 3 + (statsA.vistas || 0);
                    const puntajeB = (statsB.consultas || 0) * 3 + (statsB.vistas || 0);

                    if (puntajeA !== puntajeB) {
                        return puntajeB - puntajeA;
                    }
                    return b.id - a.id; // En caso de empate, el más nuevo arriba
                });

                // D. Renderizar
                const contenedor = document.getElementById('lista-productos');
                contenedor.innerHTML = ''; 

                if(productos.length === 0) {
                    contenedor.innerHTML = '<p style="text-align: center; grid-column: 1 / -1;">Aún no hay artículos disponibles.</p>';
                    return;
                }

                productos.forEach(producto => {
                    const textoPrecio = producto.precio > 0 ? `$${producto.precio}` : '💰 Consultar';
                    const nombreProd = producto.nombre ? producto.nombre : 'Equipo o Sistema';

                    const mensajeBase = `¡Hola! Le consulto sobre este producto:\n\n*${nombreProd}*\nPrecio: ${textoPrecio}\n\nReferencia visual: ${producto.imagen}`;
                    const linkWa = `https://wa.me/${producto.whatsapp}?text=${encodeURIComponent(mensajeBase)}`;

                    const div = document.createElement('div');
                    div.className = 'tarjeta';
                    
                    // Enlazamos las funciones abrirModal y registrarInteraccionGlobal
                    div.innerHTML = `
                        <img src="${producto.imagen}" alt="Producto" loading="lazy" onclick="abrirModal('${producto.imagen}', ${producto.id})">
                        <h3>${nombreProd}</h3>
                        <p>${producto.descripcion || ''}</p>
                        <span class="precio">${textoPrecio}</span>
                        <a href="${linkWa}" target="_blank" class="btn-whatsapp" onclick="registrarInteraccionGlobal(${producto.id}, 'consulta')">💬 Consultar</a>
                    `;
                    contenedor.appendChild(div);
                });

            } catch (error) {
                console.error("Error al cargar:", error);
                document.getElementById('lista-productos').innerHTML = '<p style="text-align: center; grid-column: 1 / -1; color: red;">Hubo un error al cargar el inventario. Asegúrate de haber subido un producto desde tu panel Admin.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', cargarInventario);
    </script>
</body>
</html>
